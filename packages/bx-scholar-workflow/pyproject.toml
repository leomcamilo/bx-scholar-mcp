[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "bx-scholar-workflow"
version = "0.1.0"
description = "Academic research workflow prompts, skills, and orchestrators — the BaXiJen way"
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [
    {name = "Leonardo Camilo", email = "leo@baxi.ia.br"},
]
keywords = [
    "mcp",
    "academic-research",
    "workflow",
    "prisma",
    "systematic-review",
    "literature-review",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Topic :: Scientific/Engineering",
]
dependencies = [
    "bx-scholar-core>=0.1.0",
    "mcp[cli]>=1.12.3",
    "pyyaml>=6.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
]

[project.scripts]
bx-scholar-workflow = "bx_scholar_workflow.server:main"

[project.urls]
Homepage = "https://github.com/leomcamilo/bx-scholar-mcp"
Issues = "https://github.com/leomcamilo/bx-scholar-mcp/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/bx_scholar_workflow"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
